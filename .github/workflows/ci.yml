name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2022]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: cargo fmt --check
        if: runner.os != 'Windows'
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test
      - run: npm run typecheck
      - run: npm test
        if: runner.os != 'Windows'
      - name: Windows native load smoke
        if: runner.os == 'Windows'
        shell: bash
        run: |
          npm run build
          node --input-type=module -e "import { generatePatch, nativeBindingExists } from './dist/src/index.js'; if (!nativeBindingExists()) throw new Error('native binding missing'); const patch = generatePatch({ 'a.txt': { before: 'one\\n', after: 'two\\n' } }); if (!patch.includes('+two')) throw new Error(patch);"
